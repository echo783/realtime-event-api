<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Factory API 운영 메인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>🏭 Factory API 운영 메인</h2>

    <div id="userInfo"></div>
    <button onclick="checkAuth()">인증 확인</button>

    <div style="margin-top:20px; padding:10px; border:1px solid #ccc;">
        <h3>🔧 개발용 토큰</h3>
        <button onclick="copyAccessToken()">AccessToken 복사</button>
        <div id="token-expire"></div>
        <div id="token-status" style="margin-top:10px; color:green;"></div>
    </div>

    <div class="card">
        <h3>📷 카메라 기능</h3>
        <button onclick="startCamera()">카메라 시작</button>
        <button onclick="stopCamera()">카메라 중지</button>
        <button onclick="goRoi()">ROI 디버그 페이지</button>
        <button onclick="loadCameraStatus()">상태 조회</button>
        <pre id="cameraStatus"></pre>
    </div>

    <div class="card">
        <h3>⚙️ 시스템</h3>
        <button onclick="logout()">로그아웃</button>
    </div>

    <script src="/js/index.js"></script>
</body>
</html>
