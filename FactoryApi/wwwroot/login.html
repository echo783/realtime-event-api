<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>운영자 로그인</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <main class="login-page">
        <section class="login-card" aria-label="운영자 로그인">
            <h1 class="login-title">운영자 로그인</h1>
            <p class="login-subtitle">Factory API 운영 대시보드에 접속합니다.</p>

            <label class="login-label" for="username">아이디</label>
            <input type="text" id="username" class="login-input" placeholder="아이디" autocomplete="username">

            <label class="login-label" for="password">비밀번호</label>
            <input type="password" id="password" class="login-input" placeholder="비밀번호" autocomplete="current-password">

            <div id="loginError" class="login-error" role="status" aria-live="polite" hidden>
                로그인 정보를 다시 확인해 주세요.
            </div>

            <button id="loginButton" class="login-button" onclick="login()">로그인</button>
        </section>
    </main>

    <script src="/js/login.js"></script>
</body>
</html>
