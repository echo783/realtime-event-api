<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>이벤트 이력 조회</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="/css/common-layout.css" />
    <link rel="stylesheet" href="/css/history.css" />
</head>
<body>
    <div class="app-shell">
        <div id="app-header"></div>

        <main class="page-shell">
            <section class="history-page" style="position:relative; z-index:1;">
                <section class="card history-filter-card">
                    <div class="card-head">
                        <div>
                            <h2 class="page-title">이벤트 이력 조회</h2>
                            <p class="page-desc">운영자가 카메라 이벤트 이력을 기간 또는 카메라별로 조회할 수 있습니다.</p>
                        </div>
                    </div>

                    <div class="history-filter-row">
                        <label class="history-field" for="cameraSelect">
                            <span class="history-field__label">카메라</span>
                            <select id="cameraSelect" class="history-select">
                                <option value="">모두</option>
                            </select>
                        </label>

                        <label class="history-field" for="startAt">
                            <span class="history-field__label">시작일시</span>
                            <input id="startAt" type="date" class="history-input" autocomplete="off" />
                        </label>

                        <label class="history-field" for="endAt">
                            <span class="history-field__label">종료일시</span>
                            <input id="endAt" type="date" class="history-input" autocomplete="off" />
                        </label>

                        <div class="history-actions">
                            <button id="btnQuery" class="history-btn history-btn--primary" type="button">조회</button>
                            <button id="btnReset" class="history-btn history-btn--secondary" type="button">초기화</button>
                        </div>
                    </div>
                </section>

                <section class="card history-results-card">
                    <div class="card-head">
                        <div>
                            <h3 class="section-title">검색 결과</h3>
                            <p class="page-desc">검색된 이벤트 목록입니다.</p>
                        </div>
                        <div class="results-meta">
                            <div class="results-count">검색 결과: <span id="resultCount">-</span></div>
                            <div id="loading" class="loading" hidden>조회 중...</div>
                        </div>
                    </div>

                    <div id="emptyState" class="empty-state" hidden>조회된 이벤트가 없습니다.</div>

                    <div class="table-wrap">
                        <table id="eventsTable" class="events-table">
                            <thead>
                                <tr>
                                    <th>발생 시간</th>
                                    <th>카메라</th>
                                    <th>이벤트 유형</th>
                                    <th>메시지</th>
                                    <th>스냅샷</th>
                                </tr>
                            </thead>
                            <tbody id="eventsTableBody"></tbody>
                        </table>
                    </div>
                </section>
            </section>
        </main>

        <div id="app-footer"></div>
    </div>

    <div id="snapshotModal" class="snapshot-modal" hidden>
        <div class="snapshot-modal__backdrop" data-close="true"></div>
        <div class="snapshot-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="snapshotModalTitle">
            <button id="snapshotModalClose" class="snapshot-modal__close" type="button" aria-label="닫기">×</button>
            <div class="snapshot-modal__header">
                <h3 id="snapshotModalTitle">스냅샷 보기</h3>
            </div>
            <div class="snapshot-modal__body">
                <img id="snapshotModalImage" alt="이벤트 스냅샷" />
            </div>
        </div>
    </div>

    <script src="/js/common-layout.js"></script>
    <script src="/js/history.js"></script>
</body>
</html>
