<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>이벤트 이력 조회</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="/css/common-layout.css" />
    <link rel="stylesheet" href="/css/history.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-shell">
        <div id="app-header"></div>

        <main class="page-shell">
            <section class="history-page" style="position:relative; z-index:1;">
                <section class="card history-filter-card">
                    <div class="card-head">
                        <div>
                            <h2 class="page-title">이벤트 이력 대시보드</h2>
                            <p class="page-desc">기간별 생산 이력을 조회하고 생산량 추이를 차트로 확인합니다.</p>
                        </div>
                    </div>

                    <div class="history-filter-row">
                        <label class="history-field" for="cameraSelect">
                            <span class="history-field__label">카메라</span>
                            <select id="cameraSelect" class="history-select">
                                <option value="">모두</option>
                            </select>
                        </label>

                        <label class="history-field" for="startAt">
                            <span class="history-field__label">시작일시</span>
                            <input id="startAt" type="date" class="history-input" autocomplete="off" />
                        </label>

                        <label class="history-field" for="endAt">
                            <span class="history-field__label">종료일시</span>
                            <input id="endAt" type="date" class="history-input" autocomplete="off" />
                        </label>

                        <div class="history-actions">
                            <button id="btnQuery" class="history-btn history-btn--primary" type="button">조회</button>
                            <button id="btnReset" class="history-btn history-btn--secondary" type="button">초기화</button>
                        </div>
                    </div>
                </section>

                <div class="history-content-grid">
                    <section class="card history-results-card">
                        <div class="card-head">
                            <div>
                                <h3 class="section-title">생산 이력 목록</h3>
                            </div>
                            <div class="results-meta">
                                <div class="results-count">검색: <span id="resultCount">-</span></div>
                                <div id="loading" class="loading" hidden>조회 중...</div>
                            </div>
                        </div>

                        <div id="emptyState" class="empty-state" hidden>데이터가 없습니다.</div>

                        <div class="table-wrap">
                            <table id="eventsTable" class="events-table">
                               <thead>
                                    <tr>
                                        <th>발생 시간</th>
                                        <th>카메라</th>
                                        <th>제품명</th>
                                        <th>수량</th>
                                    </tr>
                                </thead>
                                <tbody id="eventsTableBody"></tbody>
                            </table>
                        </div>
                    </section>

                    <section class="card history-chart-card">
                        <div class="card-head">
                            <h3 class="section-title">시간대별 생산량</h3>
                        </div>
                        <div id="chartSummary" class="chart-summary">
                            <div class="summary-item">
                                <span class="label">총 생산량</span>
                                <strong id="totalQty" class="value">-</strong>
                            </div>
                            <div class="summary-item">
                                <span class="label">이벤트 건수</span>
                                <strong id="totalEvents" class="value">-</strong>
                            </div>
                            <div class="summary-item">
                                <span class="label">평균 수량</span>
                                <strong id="avgQty" class="value">-</strong>
                            </div>
                            <div class="summary-item">
                                <span class="label">최대 생산 시간</span>
                                <strong id="peakHour" class="value">-</strong>
                            </div>
                            <div class="summary-item">
                                <span class="label">전일 대비</span>
                                <strong id="compareValue" class="value">-</strong>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="historyChart"></canvas>
                        </div>
                    </section>
                </div>
            </section>
        </main>

        <div id="app-footer"></div>
    </div>

    <!-- Snapshot modal removed as requested -->

    <script src="/js/common-layout.js"></script>
    <script src="/js/history.js"></script>
</body>
</html>
