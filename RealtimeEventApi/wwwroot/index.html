<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Factory API Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="/css/common-layout.css" />
    <link rel="stylesheet" href="/css/index.css" />
</head>
<body>
    <div class="app-shell">
        <div id="app-header"></div>

        <main class="page-shell">
            <section class="dashboard">
                <div class="dashboard-grid">
                    <section class="card control-card">
                        <div class="card-head">
                            <div>
                                <h2 class="page-title">카메라 선택 · 라이브 제어</h2>
                                <p class="page-desc">목록에서 카메라를 선택하고 바로 시작·중지할 수 있습니다.</p>
                            </div>
                            <span id="liveBadge" class="status-pill status-pill--neutral">-</span>
                        </div>

                        <div class="selected-camera-panel">
                            <div class="selected-camera-copy">
                                <span class="selected-camera-label">선택된 카메라</span>
                                <div class="selected-camera-main">
                                    <strong id="liveName">-</strong>
                                    <span id="liveId">ID: -</span>
                                </div>
                            </div>

                            <div class="selected-camera-nav">
                                <button id="btnQuickPrev" type="button" class="app-btn app-btn--ghost">◀ 이전</button>
                                <button id="btnQuickNext" type="button" class="app-btn app-btn--ghost">다음 ▶</button>
                            </div>
                        </div>

                        <div class="camera-select-row">
                            <label for="cameraSelect">목록 선택</label>
                            <select id="cameraSelect" class="select-base"></select>
                        </div>


                        <div class="live-controls-row">
                            <button id="btnStart" class="btn-primary" type="button">시작</button>
                            <button id="btnStop" class="btn-danger" type="button">중지</button>
                        </div>

                        <div class="live-bottom-grid">
                            <div id="cameraStatus" class="camera-status"></div>
                        </div>
                    </section>

                    <aside class="card log-card">
                        <div class="card-head">
                            <div>
                                <h3 class="section-title">이벤트 로그</h3>
                                <p class="page-desc">카메라 상태 변화와 제어 로그를 실시간으로 확인합니다.</p>
                            </div>
                        </div>
                        <ul id="eventLog" class="event-log" role="log" aria-label="이벤트 로그"></ul>
                    </aside>
                </div>
            </section>
        </main>

        <div id="app-footer"></div>
    </div>

    <script src="/js/common-layout.js"></script>
    <script src="/js/index.js"></script>
</body>
</html>
