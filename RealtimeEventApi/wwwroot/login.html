<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>운영자 로그인</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/common-layout.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <div class="app-shell">
        <main class="page-shell">
            <div class="login-center">
                <section class="login-brand" aria-label="AIMS 브랜드">
                    <img src="/assets/logo/aims-logo.png" alt="AIMS" class="login-brand__logo">
                    <div class="login-brand__copy">
                        <h1>AIMS</h1>
                        <p>Industrial Vision AI Monitoring System</p>
                    </div>
                </section>

                <section class="card login-card" aria-label="운영자 로그인">
                    <div class="card-head login-card__head">
                        <h2 class="page-title">운영자 로그인</h2>
                        <p class="page-desc">Factory AI 운영 대시보드</p>
                    </div>

                    <form id="loginForm" class="form-vertical" onsubmit="login(); return false;">
                        <label class="form-row">
                            <span class="form-label">아이디</span>
                            <input type="text" id="username" class="input-base" placeholder="아이디" autocomplete="username" />
                        </label>

                        <label class="form-row">
                            <span class="form-label">비밀번호</span>
                            <input type="password" id="password" class="input-base" placeholder="비밀번호" autocomplete="current-password" />
                        </label>

                        <div id="loginMessage" class="form-message login-error" role="status" aria-live="polite" hidden>
                            로그인 정보를 다시 확인해 주세요.
                        </div>

                        <div class="form-actions">
                            <button id="loginBtn" type="button" class="btn-primary" onclick="login()">로그인</button>
                        </div>
                    </form>
                </section>
            </div>
        </main>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
