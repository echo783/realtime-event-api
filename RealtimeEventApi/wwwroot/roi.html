<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>카메라 ROI 디버그</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="/css/common-layout.css" />
    <link rel="stylesheet" href="/css/roi.css" />
</head>
<body>
    <div class="app-shell">
        <div id="app-header"></div>

        <main class="page-shell roi-page-shell">
            <section class="roi-page">

                <section class="card roi-top-card">
                    <div class="card-head">
                        <div>
                            <h2 id="pageTitle" class="page-title">Camera ROI 디버그</h2>
                            <p class="page-desc">박스 드래그로 이동, 우하단 핸들로 크기 조절, 저장 시 원본 좌표로 변환됩니다.</p>
                        </div>
                        <div id="saveStatus" class="save-status idle">준비됨</div>
                    </div>

                    <div class="toolbar-row">
                        <label class="field">
                            <span class="field-label">Camera ID</span>
                            <input type="number" id="cameraId" value="1" class="input-base" />
                        </label>

                        <div class="tool-controls">
                            <div class="button-group">
                                <button id="btnLoad" class="tool-btn btn-secondary" type="button">불러오기</button>
                                <button id="btnModeObject" class="tool-btn btn-toggle active-mode" type="button">회전 ROI</button>
                                <button id="btnModeLabel" class="tool-btn btn-toggle" type="button">라벨 ROI</button>
                                <button id="btnSave" class="tool-btn btn-primary btn-emphasize" type="button">ROI 저장</button>
                            </div>

                            <div class="checks">
                                <label class="check">
                                    <input type="checkbox" id="checkRotation" checked />
                                    <span>회전 감지</span>
                                </label>
                                <label class="check">
                                    <input type="checkbox" id="checkLabel" checked />
                                    <span>라벨 감지</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="roi-main-grid">
                    <section class="card roi-video-card">
                        <div class="card-head">
                            <h3 class="section-title">영상 / ROI</h3>
                        </div>

                        <div class="roi-canvas-shell">
                            <div id="canvasWrap" class="canvas-wrap">
                                <img id="bgImage" class="roi-image" alt="ROI 배경 이미지" />
                                <canvas id="roiCanvas" class="roi-canvas"></canvas>
                            </div>
                        </div>
                    </section>

                    <aside class="roi-side-stack">
                        <section class="card roi-state-card">
                            <div class="card-head">
                                <h3 class="section-title">상태</h3>
                            </div>
                            <pre id="stateText" class="roi-pre"></pre>
                        </section>

                        <section class="card roi-values-card">
                            <div class="card-head">
                                <h3 class="section-title">ROI 값</h3>
                            </div>
                            <pre id="roiText" class="roi-pre roi-pre--values"></pre>
                        </section>
                    </aside>
                </section>

            </section>
        </main>

        <div id="app-footer"></div>
    </div>

    <script src="/js/common-layout.js"></script>
    <script src="/js/roi.js"></script>
</body>
</html>
